<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hola pancho</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        /* Pantalla de inicio para desbloquear el audio del navegador */
        .intro-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .intro-btn {
            background: transparent;
            color: #00ffcc;
            border: 3px solid #00ffcc;
            padding: 20px 40px;
            font-size: 1.8rem;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 0 15px #00ffcc;
            transition: all 0.2s ease;
        }

        .intro-btn:hover {
            background: #00ffcc;
            color: #000;
            box-shadow: 0 0 30px #00ffcc;
        }

        /* Contenedor del video */
        .video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            pointer-events: none; /* Bloquea controles nativos de YT */
        }

        .click-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            background: transparent;
            cursor: pointer;
        }

        /* Pantalla Tenebrosa */
        .scare-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            z-index: 10;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .scare-screen.active {
            display: flex;
        }

        h1 {
            color: #ff0000;
            font-size: 2.5rem;
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 15px rgba(255, 0, 0, 0.8);
            max-width: 800px;
        }

        .btn-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            background: #111;
            color: #fff;
            border: 2px solid #333;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
        }

        .btn:hover {
            background: #ff0000;
            color: #000;
            border-color: #ff0000;
            box-shadow: 0 0 15px #ff0000;
            font-weight: bold;
        }

        .creator-tag {
            position: absolute;
            bottom: 10px;
            color: #111;
            font-size: 0.8rem;
            z-index: 11;
        }
    </style>
</head>
<body>

    <!-- Pantalla de Entrada obligatoria para activar el audio -->
    <div class="intro-screen" id="introScreen">
        <button class="intro-btn" id="introBtn">Ver Reels de Obra 🏗️</button>
    </div>

    <!-- Sección del Video -->
    <div class="video-container">
        <div class="click-overlay" id="clickOverlay"></div>
        <!-- Removimos el "mute=1" para que cargue con sonido full -->
        <div id="player"></div>
    </div>

    <!-- Sección Tenebrosa -->
    <div class="scare-screen" id="scareScreen">
        <h1>¿Acaso no te gustan los reels y quieres volver a estudiar?</h1>
        
        <div class="btn-container">
            <a href="index.html" class="btn">Sí, soy puto y quiero sacar una carrera</a>
            <button class="btn" id="btnNo">No</button>
        </div>
    </div>

    <div class="creator-tag">App created by Juanech5</div>

    <!-- Cargamos la API oficial de Iframe de YouTube para controlar volumen de forma exacta -->
    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        let player;
        const introScreen = document.getElementById('introScreen');
        const introBtn = document.getElementById('introBtn');
        const overlay = document.getElementById('clickOverlay');
        const scareScreen = document.getElementById('scareScreen');
        const btnNo = document.getElementById('btnNo');

        // Inicializa el reproductor de YouTube a través de la API
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '100%',
                width: '100%',
                videoId: 'CT_cPu74ZnU',
                playerVars: {
                    'autoplay': 0, // No arranca hasta que den click al botón de inicio
                    'controls': 0,
                    'rel': 0,
                    'loop': 1,
                    'playlist': 'CT_cPu74ZnU'
                },
                events: {
                    'onReady': onPlayerReady
                }
            });
        }

        function onPlayerReady(event) {
            // Setea el volumen interno de YouTube al 100% de manera forzada
            player.setVolume(100); 
        }

        // Al hacer click en el botón de entrada, se desbloquea el contexto de audio y arranca
        introBtn.addEventListener('click', function() {
            introScreen.style.display = 'none';
            if (player && typeof player.playVideo === 'function') {
                player.unMute();
                player.setVolume(100);
                player.playVideo();
            }
        });

        // Activar la pantalla negra
        function triggerScare() {
            scareScreen.classList.add('active');
            if (player && typeof player.pauseVideo === 'function') {
                player.pauseVideo();
            }
        }

        // Detectores para la pantalla negra (Click o Espacio)
        overlay.addEventListener('click', triggerScare);

        window.addEventListener('keydown', function(e) {
            if (e.code === "Space" || e.keyCode === 32) {
                e.preventDefault();
                triggerScare();
            }
        });

        // Botón "No" regresa al video con volumen al máximo
        btnNo.addEventListener('click', function() {
            scareScreen.classList.remove('active');
            if (player && typeof player.playVideo === 'function') {
                player.setVolume(100);
                player.playVideo();
            }
        });
    </script>
</body>
</html>
