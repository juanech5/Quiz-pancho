<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hola pancho</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0d0d0d;
            font-family: 'Impact', 'Arial Black', sans-serif;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Título minimalista pero brainrot con efecto glitch */
        h1 {
            font-size: 3.5rem;
            color: #00ffcc;
            text-transform: uppercase;
            letter-spacing: -2px;
            margin: 40px 0;
            text-align: center;
            text-shadow: 0 0 20px #00ffcc;
            animation: glitch 1s linear infinite;
        }

        @keyframes glitch {
            0% { transform: skew(0deg); }
            20% { transform: skew(-3deg); color: #ff0055; }
            40% { transform: skew(3deg); color: #00ffcc; }
            60% { transform: skew(-1deg); }
            80% { transform: skew(2deg); }
            100% { transform: skew(0deg); }
        }

        /* Grid de imágenes limpio y responsivo */
        .meme-grid {
            width: 100%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }

        .meme-card {
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.2s ease-in-out;
        }

        .meme-card:hover {
            border-color: #00ffcc;
            transform: scale(1.03);
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.4);
        }

        .meme-card img {
            width: 100%;
            height: 320px;
            object-fit: cover;
            display: block;
            filter: grayscale(20%) contrast(120%);
        }

        .meme-card:hover img {
            filter: grayscale(0%) contrast(140%) saturate(150%);
        }

        /* Footer */
        footer {
            width: 100%;
            text-align: center;
            font-family: monospace;
            font-size: 0.9rem;
            color: #666;
            padding: 20px 0;
            border-top: 1px solid #222;
        }

        footer span {
            color: #ff0055;
            font-weight: bold;
        }

        @media (max-width: 600px) {
            h1 { font-size: 2.2rem; }
            .meme-card img { height: 250px; }
        }
    </style>
</head>
<body>

    <h1>hola pancho</h1>

    <div class="meme-grid">
        <div class="meme-card"><img src="https://picsum.photos/id/1025/400/400" alt="Meme"></div>
        <div class="meme-card"><img src="https://picsum.photos/id/1062/400/400" alt="Meme"></div>
        <div class="meme-card"><img src="https://picsum.photos/id/237/400/400" alt="Meme"></div>
        <div class="meme-card"><img src="https://picsum.photos/id/433/400/400" alt="Meme"></div>
        <div class="meme-card"><img src="https://picsum.photos/id/582/400/400" alt="Meme"></div>
        <div class="meme-card"><img src="https://picsum.photos/id/659/400/400" alt="Meme"></div>
    </div>

    <footer>
        App created by <span>Juanech5</span>
    </footer>

</body>
</html>
